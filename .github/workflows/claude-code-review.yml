name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      # write needed so the action can post inline review comments + a top-
      # level summary comment back to the PR. With `read` the action ran to
      # completion but its 11 posting attempts hit `permission_denials`,
      # leaving the PR comment-less (see PR #90 dry run).
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # No plugin install. Earlier attempts using the `superpowers` plugin
          # blew up runtime: the plugin's SessionStart hook injects ~20KB of
          # "you have superpowers" preamble on every turn, AND we paid double
          # by nesting an outer agent → subagent dispatch. The cancelled run
          # at 25082604775 spent 5+ minutes inside the subagent (319s, 72
          # tool calls) before the outer agent even got back to posting.
          #
          # Inline the same code-reviewer system prompt + brief here. One
          # agent, no plugin overhead, no nested dispatch.
          prompt: |
            You are a Senior Code Reviewer with expertise in software
            architecture, design patterns, and best practices. You will
            review pull request #${{ github.event.pull_request.number }}
            in ${{ github.repository }} and post a thorough review back to
            the PR as a single top-level comment.

            ## What to do

            1. Fetch the PR title + body:
                 gh pr view ${{ github.event.pull_request.number }} \
                   --repo ${{ github.repository }} \
                   --json title,body
            2. Fetch the diff:
                 gh pr diff ${{ github.event.pull_request.number }} \
                   --repo ${{ github.repository }}
            3. Fetch any prior review comments + author replies on this
               PR — a re-review on a follow-up push must respect what's
               already been addressed and what the author pushed back on:
                 gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
                   --jq '.[] | {user: .user.login, created_at, body}'
               When you produce the new review, do NOT re-flag findings
               that the author has already (a) fixed in a follow-up
               commit, or (b) pushed back on with technical reasoning
               that holds up against the current code. If you disagree
               with their pushback, say so explicitly — don't silently
               re-flag it as if the prior thread didn't happen.
            4. Read any source files cited in the diff that you need
               additional context on (use Read tool).
            5. Produce the review (format below).
            6. Use the Write tool to save the review body to
               `.review-body.md` (a path inside the repo working
               directory — `/tmp/...` is blocked by Claude Code's
               working-directory sandbox), then post it via:
                 gh pr comment ${{ github.event.pull_request.number }} \
                   --repo ${{ github.repository }} \
                   --body-file .review-body.md

            Do not ask for confirmation. Do not split into multiple
            comments. Do not invoke any subagents — produce the review
            yourself directly. Do not clean up `.review-body.md` or run
            any `rm` / `git` commands afterward — the runner is
            ephemeral and any cleanup will trip the tool allow-list.

            ## What to review

            - **Plan alignment** — does the implementation match what the PR
              description claims? Flag deviations.
            - **Code quality** — error handling, type safety, naming,
              maintainability. Adherence to existing project patterns.
            - **Architecture** — separation of concerns, coupling, fit with
              existing systems, scalability.
            - **Test coverage** — are the high-value behaviors tested? Are
              the tests meaningful (not snapshot/CRUD smoke)?
            - **Security** — credential handling, injection vectors, auth
              gates, RLS, signature verification.
            - **Operational risk** — schema migrations, data backfills,
              orphaned queue jobs at deploy, breaking changes for
              in-flight users. **Surface these as 🔴 blockers**, not
              🟡 warnings.

            ## Output format

            Post a single comment with this structure:

            ```
            ## Code Review: PR #N — <PR title>

            ### Overview
            One paragraph describing what the PR does and its scope.

            ### Strengths
            - bullet points of what was done well

            ### Issues
            🔴 **Title** (file.ts:line)
            What's wrong, why it matters, recommended fix.

            🟡 **Title** (file.ts:line)
            ...

            🟢 **Title** (file.ts:line) — minor / nit
            ...

            ### Test coverage
            What's tested, what's missing, what's worth adding.

            ### Security
            Anything notable. "No issues" is fine if true.

            ### Verdict
            ship-as-is | fix-before-merge | major-rework-needed

            One sentence rationale.
            ```

            Be candid. If the PR is clean, say so explicitly in the
            verdict. If there's a deploy-blocking operational risk
            (e.g. orphaned BullMQ repeatables, missing migrations,
            data loss on rollout), it MUST be in the 🔴 bucket — not
            buried under 🟡.
          # The action's default Bash allow-list rejects `gh` and `git`,
          # so the agent's `gh pr view` / `gh pr diff` / `gh pr comment`
          # calls hit `permission_denials` and the review never posts.
          # Whitelist the exact shape of commands the prompt asks for.
          claude_args: '--allowed-tools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh api:*),Read,Grep,Glob,Write"'
          # Drop these once the review is consistently posting.
          show_full_output: true
          display_report: false
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
